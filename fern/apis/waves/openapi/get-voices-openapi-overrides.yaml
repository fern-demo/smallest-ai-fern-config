# Override file for get-voices-openapi.yaml
# Adds lightning-v3.1 to the model enum for voice discovery

paths:
  /api/v1/{model}/get_voices:
    get:
      parameters:
        - in: path
          name: model
          required: true
          schema:
            type: string
            enum:
              - lightning
              - lightning-large
              - lightning-v2
              - lightning-v3.1
          description: The model to use for speech synthesis.
