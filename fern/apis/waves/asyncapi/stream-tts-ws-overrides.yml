# Override file for stream-tts-ws.json
# Restructures the spec to avoid $ref to #/channels/ locations which Fern doesn't support
# Specifies waves server for all endpoints

channels:
  /api/v1/streaming-tts/stream:
    x-fern-server-name: waves
    x-fern-audiences:
      - v2
      - v3
      - v4
    x-fern-sdk-group-name: Text to Speech
    title: Lightning
    description: |
      The Lightning SSE API allows you to stream text-to-speech audio in real-time. This is particularly useful for applications requiring low-latency audio generation.

      ### Connection

      Connect to the SSE endpoint:

      ```javascript
      const eventSource = new EventSource(
        'https://api.smallest.ai/api/v1/lightning/stream',
        {
          headers: {
            Authorization: 'Bearer YOUR_API_KEY'
          }
        }
      );
      ```

      ### Request Format

      Send a POST request with the following JSON structure:

      ```json
      {
        "text": "Your text to be converted to speech",
        "voice_id": "voice_id_here",
        "speed": 1,
        "sample_rate": 24000
      }
      ```

      #### Parameters

      | Parameter     | Type   | Required | Description                                         |
      | ------------- | ------ | -------- | --------------------------------------------------- |
      | `text`        | string | Yes      | The text to convert to speech (max 1000 characters) |
      | `voice_id`    | string | Yes      | ID of the voice to use                              |
      | `speed`       | number | No       | Speech speed multiplier (default: 1)                |
      | `sample_rate` | number | No       | Audio sample rate in Hz (default: 24000)            |

      ### Example Usage

      ```javascript
      const eventSource = new EventSource(
        'https://api.smallest.ai/api/v1/lightning/stream',
        {
          headers: {
            Authorization: 'Bearer YOUR_API_KEY'
          }
        }
      );

      // Handle incoming audio chunks
      eventSource.onmessage = (event) => {
        const response = JSON.parse(event.data);

        if (response.status === 'chunk') {
          // Decode and play audio
          const audioData = atob(response.data.audio);
          // Process audio data...
        } else if (response.status === 'complete' && response.done) {
          console.log('All audio chunks received');
          eventSource.close();
        } else if (response.status === 'error') {
          console.error('Error:', response.message);
          eventSource.close();
        }
      };

      eventSource.onerror = (error) => {
        console.error('SSE error:', error);
        eventSource.close();
      };
      ```

      ### Response Events

      The server will send events with the following formats:

      #### Chunk Event

      ```json
      {
        "request_id": "047c9091-b770-41d8-b96b-907d1c8406c0",
        "status": "chunk",
        "data": {
          "audio": "base64_encoded_audio_data"
        }
      }
      ```

      #### Complete Event

      ```json
      {
        "request_id": "047c9091-b770-41d8-b96b-907d1c8406c0",
        "status": "complete",
        "message": "All chunks sent",
        "done": true
      }
      ```

      #### Error Event

      ```json
      {
        "status": "error",
        "message": "Error message",
        "errors": [
          /* detailed error information */
        ]
      }
      ```

      ### Notes

      - The API automatically chunks long text and streams each chunk separately
      - Credits are deducted based on the length of the input text
      - The SSE connection will remain open until all chunks are sent or an error occurs
      - For optimal performance, keep individual requests under 1000 characters

# Override operations to remove channel refs and use component message refs
operations:
  streamingTTSRequest:
    channel: null
    messages:
      - $ref: "#/components/messages/StreamingTTSRequest"
  streamingTTSResponse:
    channel: null
    messages:
      - $ref: "#/components/messages/StreamingTTSResponse"

# Add messages to components
components:
  messages:
    StreamingTTSRequest:
      name: StreamingTTSRequest
      contentType: application/json
      payload:
        type: object
        required:
          - voice_id
          - text
        properties:
          voice_id:
            type: string
            description: "Voice identifier (e.g., 'aditi', 'male-1', 'female-2')"
          text:
            type: string
            description: The text to convert to speech. Can be sent incrementally for streaming input.
          is_streaming:
            type: boolean
            description: Indicates if this is part of a streaming text input sequence
            default: false
          is_final:
            type: boolean
            description: Indicates if this is the final chunk in a streaming sequence
            default: true
          language:
            type: string
            description: Language code for synthesis
            default: en
            enum: [en, hi, mr, kn, ta, bn, gu, de, fr, es, it, pl, nl, ru, ar, he]
          sample_rate:
            type: integer
            description: Audio sample rate in Hz
            default: 24000
            enum: [16000, 22050, 24000, 44100, 48000]
          speed:
            type: number
            description: Speech speed multiplier
            minimum: 0.1
            maximum: 5.0
            default: 1.0
          consistency:
            type: number
            description: Voice consistency parameter
            minimum: 0.0
            maximum: 1.0
            default: 0.5
          enhancement:
            type: integer
            description: Audio enhancement level
            minimum: 0
            maximum: 2
            default: 1
          similarity:
            type: number
            description: Voice similarity parameter
            minimum: 0.0
            maximum: 1.0
            default: 0.0
          max_buffer_flush_ms:
            type: integer
            description: Maximum buffer time in milliseconds before forcing audio output
            minimum: 0
            maximum: 5000
            default: 0
    StreamingTTSResponse:
      name: StreamingTTSResponse
      contentType: application/json
      payload:
        type: object
        properties:
          request_id:
            type: string
            description: Unique identifier for the streaming TTS request
          status:
            type: string
            enum: [chunk, complete, error]
            description: "Status: 'chunk' for audio data, 'complete' for end of stream, 'error' for failures"
          data:
            type: object
            properties:
              audio:
                type: string
                description: Base64-encoded PCM audio chunk
              format:
                type: string
                description: Audio format specification
                default: pcm_16bit_mono
              sample_rate:
                type: integer
                description: Sample rate of the audio chunk
                default: 24000
          error:
            type: object
            properties:
              message:
                type: string
                description: Error message description
              code:
                type: string
                description: Error code identifier
