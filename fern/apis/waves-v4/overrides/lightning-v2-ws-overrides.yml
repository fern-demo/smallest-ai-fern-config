# Override file for lightning-v2-ws.yaml (v4 docs)
# Adds server mapping, audience tags, and unique message names

servers:
  production:
    x-fern-server-name: waves

channels:
  /api/v1/lightning-v2/get_speech/stream:
    x-fern-server-name: waves
    x-fern-audiences:
      - v4docs
    x-fern-sdk-group-name: Text to Speech V2
    title: Lightning v2 WebSocket
    description: The Lightning v2 WebSocket API provides real-time text-to-speech streaming capabilities with high-quality voice synthesis.
    servers:
      - $ref: "#/servers/production"
    messages:
      lightningV2TtsRequest.message:
        name: V4LightningV2TtsRequest
      lightningV2TtsResponse.message:
        name: V4LightningV2TtsResponse

operations:
  ttsRequest:
    action: send
  ttsResponse:
    action: receive
