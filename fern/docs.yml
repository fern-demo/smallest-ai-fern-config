# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: smallest-ai.docs.buildwithfern.com

title: Smallest AI Docs

ai-search:
  location:
    - docs

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

tabs:
  atoms:
    display-name: Atoms
    icon: fa-solid fa-robot
  waves:
    display-name: Waves
    icon: fa-solid fa-waveform-lines

navigation:
  - tab: atoms
    variants:
      - title: Guides
        icon: fa-solid fa-book
        slug: guides
        layout:
          - section: Get Started
            contents:
              - page: Introduction
                path: ./products/atoms/pages/introduction.mdx
              - page: Quickstart
                path: ./products/atoms/pages/quickstart.mdx
          - section: Deep Dive
            contents:
              - page: Audience
                path: ./products/atoms/pages/deep-dive/audience/audience.mdx
              - page: Call Logs
                path: ./products/atoms/pages/deep-dive/call-logs/what-is-a-call-log.mdx
              - page: Campaign
                path: ./products/atoms/pages/deep-dive/campaign/campaign.mdx
              - page: Knowledge Base
                path: ./products/atoms/pages/deep-dive/knowledge-base/knowledge-base.mdx
              - page: Phone Number
                path: ./products/atoms/pages/deep-dive/phone-number/phone-number.mdx
              - page: Webhooks
                path: ./products/atoms/pages/deep-dive/webhooks/webhooks.mdx
              - page: Widget
                path: ./products/atoms/pages/deep-dive/widget/widget.mdx
          - section: FAQs
            contents:
              - page: Frequently Asked Questions
                path: ./products/atoms/pages/faqs/frequently-asked-questions.mdx
      - title: API Reference
        icon: fa-solid fa-puzzle-piece
        slug: api-reference
        layout:
          - api: API Reference
            api-name: atoms
            flattened: true
            layout:
              - user:
                  title: User
              - organization:
                  title: Organization
              - agentTemplates:
                  title: Agent Templates
              - agents:
                  title: Agents
              - workflows:
                  title: Workflows
              - knowledgeBase:
                  title: Knowledge Base
              - telephony:
                  title: Telephony
              - campaigns:
                  title: Campaigns
              - audiences:
                  title: Audiences
              - conversions:
                  title: Conversions
              - conversations:
                  title: Conversations
              - callLogs:
                  title: Call Logs
              - webhooks:
                  title: Webhooks
  - tab: waves
    versions:
      - display-name: v4.0.0
        path: ./products/waves/versions/v4.0.0.yml
      - display-name: v3.0.1
        path: ./products/waves/versions/v3.0.1.yml
      - display-name: v2.2.0
        path: ./products/waves/versions/v2.2.0.yml

colors:
  accentPrimary:
    dark: '#083b4d'
    light: '#083b4d'
  background:
    dark: '#000000'
    light: '#FFFFFF'

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: docs/assets/logo_light.png
  light: docs/assets/logo_dark.png
  height: 30

favicon: docs/assets/favicon.svg
