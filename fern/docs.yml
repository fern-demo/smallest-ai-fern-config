# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: smallest-ai.docs.buildwithfern.com

title: Smallest AI Docs

ai-search:
  location:
    - docs

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

# Product switcher configuration
products:
  - display-name: Atoms
    path: ./products/atoms.yml
    icon: fa-solid fa-robot
    slug: atoms
    subtitle: AI Voice Agents Platform

  - display-name: Waves
    path: ./products/waves/versions/v4.0.0.yml
    icon: fa-solid fa-waveform-lines
    slug: waves
    subtitle: Text-to-Speech & Speech-to-Text APIs
    versions:
      - display-name: v4.0.0
        path: ./products/waves/versions/v4.0.0.yml
      - display-name: v3.0.1
        path: ./products/waves/versions/v3.0.1.yml
      - display-name: v2.2.0
        path: ./products/waves/versions/v2.2.0.yml

navbar-links:
  - type: minimal
    text: GitHub
    url: https://github.com/smallest-ai
  - type: filled
    text: Dashboard
    url: https://dashboard.smallest.ai

colors:
  accentPrimary:
    dark: '#083b4d'
    light: '#083b4d'
  background:
    dark: '#000000'
    light: '#FFFFFF'

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: docs/assets/logo_light.png
  light: docs/assets/logo_dark.png
  height: 30

favicon: docs/assets/favicon.svg
